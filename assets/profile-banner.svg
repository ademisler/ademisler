<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Adem Isler profile banner</title>
  <desc id="desc">Dark GitHub profile banner for Adem Isler with a green ring mark, red core, and selected focus areas.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070c"/>
      <stop offset="58%" stop-color="#0a0f18"/>
      <stop offset="100%" stop-color="#030407"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#67f58f"/>
      <stop offset="100%" stop-color="#20c05c"/>
    </linearGradient>
    <filter id="soft-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1120" cy="108" r="132" fill="#67f58f" opacity="0.08" filter="url(#soft-blur)"/>
  <circle cx="1090" cy="520" r="170" fill="#ff5b5b" opacity="0.08" filter="url(#soft-blur)"/>
  <circle cx="250" cy="560" r="190" fill="#67f58f" opacity="0.05" filter="url(#soft-blur)"/>

  <g opacity="0.14" stroke="#ffffff" stroke-width="1">
    <path d="M0 126h1280"/>
    <path d="M0 512h1280"/>
    <path d="M186 0v640"/>
    <path d="M928 0v640"/>
  </g>

  <g transform="translate(120 124)">
    <circle cx="88" cy="88" r="72" fill="none" stroke="url(#glow)" stroke-width="22"/>
    <circle cx="88" cy="88" r="18" fill="#ff5b5b"/>
    <circle cx="88" cy="88" r="110" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  </g>

  <text x="310" y="220" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="76" font-weight="700" letter-spacing="-1.6">
    Adem Isler
  </text>
  <text x="310" y="280" fill="#c3cddd" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="31" font-weight="500">
    Practical AI tools, browser products, and automation software
  </text>
  <text x="310" y="338" fill="#79849a" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="21" font-weight="400">
    Building local-first utilities, clean desktop apps, and open-source workflows that ship fast
  </text>

  <g transform="translate(310 404)">
    <rect x="0" y="0" width="170" height="46" rx="23" fill="#101723" stroke="#1d2636"/>
    <text x="85" y="29" text-anchor="middle" fill="#d8e0ed" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="600">AI Tools</text>

    <rect x="188" y="0" width="210" height="46" rx="23" fill="#101723" stroke="#1d2636"/>
    <text x="293" y="29" text-anchor="middle" fill="#d8e0ed" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="600">Browser Products</text>

    <rect x="416" y="0" width="182" height="46" rx="23" fill="#101723" stroke="#1d2636"/>
    <text x="507" y="29" text-anchor="middle" fill="#d8e0ed" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="600">Desktop Apps</text>

    <rect x="616" y="0" width="224" height="46" rx="23" fill="#101723" stroke="#1d2636"/>
    <text x="728" y="29" text-anchor="middle" fill="#d8e0ed" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="600">WordPress AI</text>
  </g>
</svg>
