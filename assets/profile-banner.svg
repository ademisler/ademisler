<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Adem Isler banner</title>
  <desc id="desc">Dark profile banner with subtle geometric accents and a short positioning statement.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#0c1424"/>
      <stop offset="100%" stop-color="#05070d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7dff6a"/>
      <stop offset="50%" stop-color="#3ea8ff"/>
      <stop offset="100%" stop-color="#ff4d6d"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="980" cy="120" r="120" fill="#7dff6a" opacity="0.08" filter="url(#blur)"/>
  <circle cx="1140" cy="520" r="160" fill="#ff4d6d" opacity="0.07" filter="url(#blur)"/>
  <circle cx="200" cy="530" r="180" fill="#3ea8ff" opacity="0.08" filter="url(#blur)"/>

  <path d="M120 472c140-76 232-96 392-96s252 20 392 96" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity="0.72"/>
  <path d="M120 486c140-64 232-80 392-80s252 16 392 80" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" opacity="0.12"/>

  <g transform="translate(120 132)">
    <circle cx="78" cy="78" r="72" fill="none" stroke="url(#accent)" stroke-width="18"/>
    <circle cx="78" cy="78" r="20" fill="#ff4d6d"/>
    <circle cx="78" cy="78" r="110" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  </g>

  <text x="300" y="236" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="72" font-weight="700" letter-spacing="-1.5">
    Adem Isler
  </text>
  <text x="300" y="292" fill="#b8c3d9" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="30" font-weight="500">
    AI tools, browser utilities, and WordPress products
  </text>
  <text x="300" y="350" fill="#6f7d96" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="400">
    Shipping polished open source with a strong focus on speed, clarity, and sustainable maintenance
  </text>
</svg>
